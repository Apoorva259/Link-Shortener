<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>snip:// — URL shortener</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0B0F14;
    --bg-raised: #121821;
    --bg-input: #0E141C;
    --border: #1E2733;
    --border-bright: #2C394A;
    --text: #E7EAEE;
    --text-dim: #8A97A8;
    --text-faint: #4E5A6B;
    --accent: #57E6C4;
    --accent-dim: #2C7A68;
    --amber: #F0B429;
    --error: #FF6B6B;
    --mono: 'JetBrains Mono', monospace;
    --display: 'Space Grotesk', sans-serif;
    --body: 'Inter', sans-serif;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--body);
    min-height: 100vh;
  }

  body {
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 48px 48px;
    background-position: center -1px;
    background-attachment: fixed;
    background-color: var(--bg);
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 900px 500px at 50% -10%, rgba(87,230,196,0.09), transparent 70%);
    pointer-events: none;
  }

  .wrap {
    position: relative;
    max-width: 720px;
    margin: 0 auto;
    padding: 56px 24px 80px;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 64px;
  }

  .logo {
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.02em;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .logo .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 10px var(--accent);
  }

  .tag {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-faint);
  }

  h1 {
    font-family: var(--display);
    font-weight: 700;
    font-size: clamp(32px, 6vw, 44px);
    line-height: 1.15;
    letter-spacing: -0.02em;
    margin: 0 0 12px;
  }

  h1 span {
    color: var(--accent);
  }

  .sub {
    color: var(--text-dim);
    font-size: 16px;
    line-height: 1.6;
    max-width: 46ch;
    margin: 0 0 40px;
  }

  form {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .input-row {
    display: flex;
    gap: 8px;
  }

  input[type="text"], input[type="url"] {
    font-family: var(--mono);
    font-size: 14px;
    background: var(--bg-input);
    border: 1px solid var(--border-bright);
    border-radius: 8px;
    color: var(--text);
    padding: 15px 16px;
    outline: none;
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
    width: 100%;
  }

  input::placeholder { color: var(--text-faint); }

  input:focus {
    border-color: var(--accent-dim);
    box-shadow: 0 0 0 3px rgba(87,230,196,0.12);
  }

  #urlInput { flex: 1; }

  #customCode {
    max-width: 160px;
  }

  .row-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 2px;
    display: block;
  }

  button {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 600;
    background: var(--accent);
    color: #06110D;
    border: none;
    border-radius: 8px;
    padding: 15px 22px;
    cursor: pointer;
    transition: transform 0.1s ease, background 0.15s ease;
    white-space: nowrap;
  }

  button:hover { background: #6FF0D2; }
  button:active { transform: scale(0.98); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }

  .error-msg {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--error);
    min-height: 18px;
    margin-top: 2px;
  }

  /* Result / compression signature */
  .result {
    margin-top: 32px;
    border: 1px solid var(--border-bright);
    border-radius: 10px;
    background: var(--bg-raised);
    padding: 22px 22px 20px;
    display: none;
  }

  .result.show { display: block; animation: rise 0.35s ease; }

  @keyframes rise {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .short-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 16px;
  }

  .short-url {
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 600;
    color: var(--accent);
    word-break: break-all;
  }

  .copy-btn {
    background: transparent;
    border: 1px solid var(--border-bright);
    color: var(--text-dim);
    font-size: 12px;
    padding: 8px 12px;
    flex-shrink: 0;
  }

  .copy-btn:hover { background: var(--bg-input); color: var(--text); }

  /* compression bar: literal visualization of shrink ratio */
  .compress-meter {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .compress-labels {
    display: flex;
    justify-content: space-between;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-faint);
  }

  .compress-labels .pct {
    color: var(--accent);
    font-weight: 600;
  }

  .bar-track {
    height: 6px;
    background: var(--bg-input);
    border-radius: 3px;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .bar-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--accent-dim), var(--accent));
    border-radius: 3px;
    transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1);
  }

  /* history */
  .history {
    margin-top: 56px;
  }

  .history-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .history-head h2 {
    font-family: var(--mono);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-faint);
    font-weight: 600;
    margin: 0;
  }

  .history-count {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-faint);
  }

  .hist-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 13px 0;
    border-bottom: 1px solid var(--border);
  }

  .hist-item:last-child { border-bottom: none; }

  .hist-code {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    flex-shrink: 0;
    width: 74px;
  }

  .hist-url {
    font-family: var(--body);
    font-size: 13px;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }

  .hist-clicks {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-faint);
    flex-shrink: 0;
  }

  .empty-state {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text-faint);
    padding: 20px 0;
  }

  @media (max-width: 520px) {
    .input-row { flex-direction: column; }
    #customCode { max-width: none; }
    .hist-url { max-width: 140px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo"><span class="dot"></span>snip://</div>
    <div class="tag">v1.0</div>
  </header>

  <h1>Make it <span>shorter.</span></h1>
  <p class="sub">Paste a long link, get a short one back. Every shortened link is tracked — clicks and all.</p>

  <form id="shortenForm">
    <div class="input-row">
      <input type="url" id="urlInput" placeholder="https://example.com/a/very/long/path?with=params" required>
      <button type="submit" id="submitBtn">Shorten</button>
    </div>
    <div>
      <span class="row-label">Custom code (optional)</span>
      <input type="text" id="customCode" placeholder="my-link">
    </div>
    <div class="error-msg" id="errorMsg"></div>
  </form>

  <div class="result" id="result">
    <div class="short-row">
      <div class="short-url" id="shortUrlText"></div>
      <button class="copy-btn" id="copyBtn">Copy</button>
    </div>
    <div class="compress-meter">
      <div class="compress-labels">
        <span id="charsBefore"></span>
        <span class="pct" id="pctReduced"></span>
        <span id="charsAfter"></span>
      </div>
      <div class="bar-track"><div class="bar-fill" id="barFill"></div></div>
    </div>
  </div>

  <div class="history">
    <div class="history-head">
      <h2>Recent links</h2>
      <span class="history-count" id="historyCount"></span>
    </div>
    <div id="historyList"></div>
  </div>
</div>

<script>
const form = document.getElementById('shortenForm');
const urlInput = document.getElementById('urlInput');
const customCode = document.getElementById('customCode');
const errorMsg = document.getElementById('errorMsg');
const submitBtn = document.getElementById('submitBtn');
const result = document.getElementById('result');
const shortUrlText = document.getElementById('shortUrlText');
const copyBtn = document.getElementById('copyBtn');
const charsBefore = document.getElementById('charsBefore');
const charsAfter = document.getElementById('charsAfter');
const pctReduced = document.getElementById('pctReduced');
const barFill = document.getElementById('barFill');
const historyList = document.getElementById('historyList');
const historyCount = document.getElementById('historyCount');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  errorMsg.textContent = '';
  submitBtn.disabled = true;
  submitBtn.textContent = 'Shortening…';

  const payload = { url: urlInput.value.trim() };
  const code = customCode.value.trim();
  if (code) payload.custom_code = code;

  try {
    const res = await fetch('/api/shorten', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const data = await res.json();

    if (!res.ok) {
      throw new Error(data.detail || 'Something went wrong');
    }

    showResult(data);
    customCode.value = '';
    loadHistory();
  } catch (err) {
    errorMsg.textContent = err.message;
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = 'Shorten';
  }
});

function showResult(data) {
  shortUrlText.textContent = data.short_url;
  shortUrlText.dataset.url = data.short_url;

  const before = data.original_url.length;
  const after = data.short_url.length;
  const pct = Math.max(0, Math.round((1 - after / before) * 100));

  charsBefore.textContent = `${before} chars`;
  charsAfter.textContent = `${after} chars`;
  pctReduced.textContent = `−${pct}%`;

  result.classList.add('show');
  barFill.style.width = '0%';
  requestAnimationFrame(() => {
    setTimeout(() => { barFill.style.width = pct + '%'; }, 50);
  });
}

copyBtn.addEventListener('click', async () => {
  const url = shortUrlText.dataset.url;
  if (!url) return;
  await navigator.clipboard.writeText(url);
  const original = copyBtn.textContent;
  copyBtn.textContent = 'Copied';
  setTimeout(() => { copyBtn.textContent = original; }, 1400);
});

async function loadHistory() {
  try {
    const res = await fetch('/api/urls');
    const items = await res.json();
    historyCount.textContent = items.length ? `${items.length} link${items.length === 1 ? '' : 's'}` : '';

    if (!items.length) {
      historyList.innerHTML = '<div class="empty-state">Nothing shortened yet. Your links will show up here.</div>';
      return;
    }

    historyList.innerHTML = items.map(item => `
      <div class="hist-item">
        <div class="hist-code">/${item.code}</div>
        <div class="hist-url" title="${escapeHtml(item.original_url)}">${escapeHtml(item.original_url)}</div>
        <div class="hist-clicks">${item.clicks} click${item.clicks === 1 ? '' : 's'}</div>
      </div>
    `).join('');
  } catch (err) {
    historyList.innerHTML = '<div class="empty-state">Couldn\'t load history.</div>';
  }
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

loadHistory();
</script>
</body>
</html>
